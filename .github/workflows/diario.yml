name: BioCore Daily Report

on:
  schedule:
    # Se ejecuta cada 30 minutos para revisar si a algún cliente le toca su reporte
    # '*/30 * * * *' significa: "cada 30 min, todos los días"
    - cron: '*/30 * * * *' 
  workflow_dispatch: # Esto te permite darle a un botón en GitHub para probar si funciona

jobs:
  envio_reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v2

      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11' # Actualizado a una versión más moderna

      - name: Instalar dependencias
        run: |
          pip install pandas requests earthengine-api supabase pytz

      - name: Ejecutar Script Automático
        run: python scheduler.py
        env:
          # Estas son las llaves que debes configurar en "GitHub Secrets"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Si usas Google Earth Engine, también necesitas su llave
          EE_PROJECT_ID: ${{ secrets.EE_PROJECT_ID }}
